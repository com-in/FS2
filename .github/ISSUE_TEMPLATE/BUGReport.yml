name: "Bug 反馈"
description: "使用程序中出现了BUG"
labels: [· BUG,新提交]
body:
- type: checkboxes
  id: "yml-1"
  attributes:
    label: "检查项"
    description: "请逐个检查下列项目，并勾选确认。"
    options:
    - label: "我已在 [Issues 页面](https://github.com/com-in/FS2/issues?q=is%3Aissue+)中搜索，确认了这一 Bug 未被提交过。"
      required: true
- type: textarea
  id: "yml-2"
  attributes:
    label: 描述
    description: "详细描述该 Bug 的具体表现。"
  validations:
    required: true
- type: textarea
  id: "yml-3"
  attributes:
    label: 重现步骤
    description: "详细描述要怎么操作才能再次触发这个 Bug。"
    value: |
      1、点击xxxx
      2、选择xxxx
  validations:
    required: true
- type: textarea
  id: "yml-4"
  attributes:
    label: 附件
    description: "上传软件截图"
  validations:
    required: true
